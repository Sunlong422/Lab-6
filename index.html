
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>

    <!-- DaisyUI + Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/daisyui.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-base-200 min-h-screen flex items-center justify-center">

    <div class="card bg-base-100 w-96 shadow-xl p-6">
        <h2 class="text-2xl font-bold text-center mb-4">Login Page</h2>

        <div class="form-control w-full mb-4">
            <label class="label">
                <span class="label-text font-extrabold text-shadow-black">Username</span>
            </label>
            <input id="username" type="text" placeholder="Enter username"
                   class="input input-bordered w-full" />
        </div>

        <button onclick="login()" class="btn btn-primary w-full">
            Login
        </button>
    </div>

    <script>
        function login() {
            let username = document.getElementById("username").value;

            // Save to cookie (expires in 1 day)
            document.cookie = "username=" + username + "; max-age=86400";

            // Redirect to register page
            window.location.href = "Register.html";
        }
    </script>

</body>
</html>
